<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    .container {
      width: 240px;
      background-color: rgb(255, 0, 204);
      margin: 0px;
      padding: 20px;
      border-radius: 8px;
    }

    .box {
      width: 50px;
      min-height: 50px;
      background-color: blue;
      margin: 10px;
      padding: 15px;
      color: rgb(14, 36, 71);
    }

    .kichwa {
      margin: 10px;
      padding: 1px;
      background-color: #ae4858;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">Box content</div>
  </div>

  <ul>
    <li class="kichwa">one</li>
    <li class="kichwa">two</li>
    <li class="kichwa">three</li>
    <li class="kichwa">four</li>
    <li class="kichwa">five</li>
  </ul>
</body>
</html>
